worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 128;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log off;
    sendfile on;
    gzip off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 3100;
        server_name _;

        location / {
            proxy_pass http://127.0.0.1:3101;
            proxy_http_version 1.1;
            proxy_set_header Host              $http_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_read_timeout 86400;
            proxy_buffering off;

            # --- Ingress Path Fix ---
            # Rewrite absolute paths to relative so HA Ingress proxy
            # can route them correctly through /api/hassio_ingress/<token>/
            sub_filter_types text/html application/javascript text/javascript;
            sub_filter_once off;

            # Inject fetch/XHR interceptor that rewrites absolute paths
            sub_filter '</head>' '<script>(function(){var f=window.fetch;window.fetch=function(u,o){if(typeof u==="string"&&u[0]==="/")u="./"+u.substring(1);return f.call(this,u,o)};var x=XMLHttpRequest.prototype.open;XMLHttpRequest.prototype.open=function(){if(typeof arguments[1]==="string"&&arguments[1][0]==="/")arguments[1]="./"+arguments[1].substring(1);return x.apply(this,arguments)};var W=window.WebSocket;window.WebSocket=function(u,p){if(u&&u.indexOf&&u.indexOf("/")>-1){try{var loc=window.location;var proto=loc.protocol==="https:"?"wss:":"ws:";var base=loc.pathname.replace(/\/$/,"");if(u[0]==="/")u=proto+"//"+loc.host+base+u}catch(e){}}return p?new W(u,p):new W(u)}})()</script></head>';

            # HTML src/href attributes: "/..." -> "./"
            sub_filter 'src="/' 'src="./';
            sub_filter 'href="/' 'href="./';

            # JS dynamic imports for assets
            sub_filter '"/assets/' '"./assets/';
            sub_filter "'/assets/" "'./assets/";
        }
    }
}
