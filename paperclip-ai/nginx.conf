worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 128;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log off;
    sendfile on;
    gzip off;
    client_body_temp_path /tmp/nginx_client_body;
    proxy_temp_path /tmp/nginx_proxy;
    fastcgi_temp_path /tmp/nginx_fastcgi;
    uwsgi_temp_path /tmp/nginx_uwsgi;
    scgi_temp_path /tmp/nginx_scgi;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 3100;
        server_name _;

        # Injizierter Script: rewrite alle absoluten Pfade zur Laufzeit
        location = /__ingress_inject.js {
            default_type application/javascript;
            return 200 "(function(){var p=window.location.pathname;var BASE=p.charAt(p.length-1)==='/'?p.slice(0,-1):p;function fix(u){if(typeof u==='string'&&u.charAt(0)==='/'&&u.indexOf('//')!==0)return BASE+u;return u;}var f=window.fetch;window.fetch=function(u,o){return f.call(this,fix(u),o);};var x=XMLHttpRequest.prototype.open;XMLHttpRequest.prototype.open=function(m,u){arguments[1]=fix(u);return x.apply(this,arguments);};var W=window.WebSocket;window.WebSocket=function(u,q){if(typeof u==='string'&&u.charAt(0)==='/'){var l=window.location;u=(l.protocol==='https:'?'wss:':'ws:')+'//'+l.host+BASE+u;}return q?new W(u,q):new W(u);};window.WebSocket.prototype=W.prototype;})();";
        }

        location / {
            proxy_pass http://127.0.0.1:3101;
            proxy_http_version 1.1;
            proxy_set_header Host              $http_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_read_timeout 86400;
            proxy_buffering off;

            # Upstream darf nicht komprimieren, sonst kann sub_filter nicht greifen
            proxy_set_header Accept-Encoding "";

            # --- Ingress Path Fix ---
            sub_filter_types text/html application/javascript text/javascript;
            sub_filter_once off;

            # Script-Tag injizieren (lädt /__ingress_inject.js — relativer Pfad!)
            sub_filter '</head>' '<script src="./__ingress_inject.js"></script></head>';

            # HTML/JS absolute Pfade -> relativ
            sub_filter 'src="/'      'src="./';
            sub_filter 'href="/'     'href="./';
            sub_filter '"/assets/'   '"./assets/';
            sub_filter "'/assets/"   "'./assets/";
        }
    }
}
