name: Paperclip AI
version: 1.6.0
slug: paperclip-ai
description: Open-source orchestration for zero-human companies
url: https://github.com/paperclipai/paperclip
arch:
  - amd64
  - aarch64
startup: application
boot: auto
init: false

ingress: true
